<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>FlameTech - Dang cap nhat he thong</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            color: #101828;
            background: #f6f7fb;
        }

        .notice {
            width: min(100%, 520px);
            padding: 32px;
            border: 1px solid #e4e7ec;
            border-radius: 8px;
            background: #ffffff;
            text-align: center;
            box-shadow: 0 18px 50px rgba(16, 24, 40, 0.08);
        }

        .brand {
            margin: 0 0 12px;
            font-size: 15px;
            font-weight: 700;
            color: #175cd3;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(26px, 5vw, 38px);
            line-height: 1.15;
        }

        p {
            margin: 0;
            font-size: 16px;
            line-height: 1.6;
            color: #475467;
        }
    </style>
</head>
<body>
    <main class="notice">
        <p class="brand">FlameTech Buy Key</p>
        <h1>Dang cap nhat he thong...</h1>
        <p>Website mua key dang duoc bao tri. Vui long quay lai sau.</p>
    </main>
</body>
</html>
