<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>FLAME TECH Hub</title>
<link rel="stylesheet" href="./styles.css">
<script src="./script.js" defer></script>
</head>
<body>
<main>
  <div class="hub">
    <section class="frame">
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="hubGrad" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#ff7083"/>
                  <stop offset="100%" stop-color="#e8001e"/>
                </linearGradient>
              </defs>
              <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="url(#hubGrad)" stroke-width="1.6"/>
              <path d="M13 11L16 7L19 11H17.5V20H19L16 25L13 20H14.5V11H13Z" fill="url(#hubGrad)"/>
            </svg>
          </div>
          <div>
            <div class="brand-title">FLAME TECH</div>
            <div class="brand-sub">System Launcher</div>
          </div>
        </div>
        <div class="status">Red Neon Default</div>
      </div>
      <div class="deck">
        <section class="launch">
          <button class="launch-card" type="button" data-target="VIP/index.html">
            <div>
              <div class="launch-top">
                <div class="launch-index">01</div>
              </div>
              <div class="launch-label">PREMIUM</div>
              <div class="launch-line"></div>
            </div>
            <div class="launch-action">
              <span>Launch</span>
              <svg viewBox="0 0 16 16" fill="none">
                <path d="M3 8H13" stroke="#ff7083" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M8 3L13 8L8 13" stroke="#ff7083" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </button>
          <button class="launch-card" type="button" data-target="FREE/index.html">
            <div>
              <div class="launch-top">
                <div class="launch-index">02</div>
              </div>
              <div class="launch-label">FREE</div>
              <div class="launch-line"></div>
            </div>
            <div class="launch-action">
              <span>Launch</span>
              <svg viewBox="0 0 16 16" fill="none">
                <path d="M3 8H13" stroke="#ff7083" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M8 3L13 8L8 13" stroke="#ff7083" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </button>
        </section>
      </div>
    </section>
  </div>
</main>
</body>
</html>
